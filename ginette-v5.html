/* ============================================
   PODCASTFLOW - Dark/Orange Theme v5
   ============================================ */

:root {
  --bg-primary: #0f0f0f;
  --bg-secondary: #1a1a1a;
  --bg-card: #1e1e1e;
  --bg-card-hover: #252525;
  --bg-input: #2a2a2a;
  --border: #2e2e2e;
  --border-light: #383838;
  --orange: #f97316;
  --orange-dark: #ea6c0a;
  --orange-light: #fb923c;
  --blue: #60a5fa;
  --blue-dim: rgba(96, 165, 250, 0.15);
  --orange-dim: rgba(249, 115, 22, 0.15);
  --text-primary: #f5f5f5;
  --text-secondary: #a0a0a0;
  --text-muted: #666;
  --success: #22c55e;
  --error: #ef4444;
  --nav-height: 68px;
  --header-height: 64px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-xl: 24px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100dvh;
  max-width: 430px;
  margin: 0 auto;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

@media (min-width: 601px) { body { max-width: 100%; } }

button { cursor: pointer; border: none; background: none; font-family: inherit; }
input, select { font-family: inherit; }
a { color: var(--orange); text-decoration: none; }

#app { position: relative; min-height: 100dvh; }

.view {
  display: none;
  flex-direction: column;
  min-height: 100dvh;
  padding-bottom: var(--nav-height);
  overflow-y: auto;
}
.view.active { display: flex; }

@media (min-width: 601px) { .view { padding-bottom: 0; } }

.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 8px;
  padding-top: max(12px, env(safe-area-inset-top));
  min-height: var(--header-height);
  background: var(--bg-primary);
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 1px solid var(--border);
}

@media (min-width: 601px) { .app-header { padding: 16px 24px; } }

.header-left { display: flex; flex-direction: column; gap: 2px; }
.header-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500; }
.header-title { display: flex; align-items: center; gap: 4px; color: var(--text-secondary); font-size: 12px; font-weight: 500; }
.header-title svg { color: var(--orange); }
.header-actions { display: flex; align-items: center; gap: 8px; }

.btn-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  transition: all 0.2s;
}
.btn-icon:active { transform: scale(0.95); background: var(--bg-card-hover); }

.stats-card {
  margin: 16px 16px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px 14px 16px;
  text-align: center;
}

@media (min-width: 601px) { .stats-card { margin: 24px auto; max-width: 900px; width: calc(100% - 48px); } }

.stat-today-block { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-bottom: 16px; }
.stat-today-val { font-size: 56px; font-weight: 900; color: var(--orange); line-height: 1; letter-spacing: -2px; }
.stat-today-lbl { font-size: 12px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; }
.stat-prev-row { display: flex; align-items: center; justify-content: center; gap: 0; padding: 12px 24px; border-top: 1px solid var(--border); }
.stat-prev-col { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
.stat-prev-val { font-size: 20px; font-weight: 700; color: var(--text-secondary); line-height: 1; }
.stat-prev-lbl { font-size: 10px; color: var(--text-muted); font-weight: 500; }
.stat-prev-sep { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }
.stats-subtitle { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-top: 4px; }

.monitoring-section { margin: 0 16px 16px; }
@media (min-width: 601px) { .monitoring-section { margin: 0 24px 24px; max-width: 900px; margin-left: auto; margin-right: auto; } }

.monitoring-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.monitoring-title { font-size: 14px; font-weight: 700; color: var(--text-primary); letter-spacing: 0.2px; }
.monitoring-count { font-size: 12px; font-weight: 600; color: var(--text-muted); background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; }
.monitoring-loading { text-align: center; color: var(--text-muted); font-size: 13px; padding: 24px 0; }

.monitoring-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

@media (min-width: 601px) {
  .monitoring-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 12px;
  }
}

.monitor-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  transition: all 0.2s;
}

.monitor-row:hover { background: var(--bg-card-hover); }

@media (min-width: 601px) {
  .monitor-row {
    flex-direction: column;
    align-items: flex-start;
  }
}

.monitor-thumb {
  width: 48px;
  height: 48px;
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--border);
}

.monitor-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-green { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
.dot-gray { background: #3f3f46; }

.monitor-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
@media (min-width: 601px) { .monitor-info { width: 100%; gap: 6px; margin-bottom: 8px; } }

.monitor-name { font-size: 13px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
@media (min-width: 601px) { .monitor-name { white-space: normal; font-size: 14px; font-weight: 700; } }

.monitor-time { font-size: 11px; color: var(--text-muted); }
.monitor-desc { font-size: 11px; color: var(--text-muted); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
@media (min-width: 601px) { .monitor-desc { white-space: normal; } }

.monitor-badge { font-size: 14px; font-weight: 700; text-align: center; flex-shrink: 0; color: var(--orange); }
@media (min-width: 601px) { .monitor-badge { font-size: 20px; align-self: flex-start; } }

.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-around;
  height: var(--nav-height);
  padding-bottom: env(safe-area-inset-bottom);
  background: var(--bg-primary);
  border-top: 1px solid var(--border);
  z-index: 20;
}

@media (min-width: 601px) { .bottom-nav { display: none; } }

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  flex: 1;
  height: 100%;
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  transition: color 0.2s;
}

.nav-item.active { color: var(--orange); }
.nav-item svg { width: 22px; height: 22px; }

.bottom-spacer { height: 16px; }

.toast {
  position: fixed;
  bottom: calc(var(--nav-height) + 16px);
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 12px 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  z-index: 300;
  white-space: nowrap;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
  opacity: 0;
  max-width: 90%;
}

@media (min-width: 601px) { .toast { bottom: 24px; } }

.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.success { border-color: rgba(34,197,94,0.4); color: var(--success); }

.spinner {
  width: 28px;
  height: 28px;
  border: 3px solid var(--border);
  border-top-color: var(--orange);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    async function fetchRSS(url) {
      try {
        const res = await fetch(url, { 
          headers: { 'User-Agent': 'Mozilla/5.0' },
          mode: 'cors'
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.text();
      } catch (e) {
        return null;
      }
    }

    function parseEpisodes(xml) {
      if (!xml) return { today: 0, yesterday: 0, desc: '', latestDate: 0, image: '' };
      
      const parser = new DOMParser();
      const doc = parser.parseFromString(xml, 'text/xml');
      
      if (doc.querySelector('parsererror')) return { today: 0, yesterday: 0, desc: '', latestDate: 0, image: '' };

      const now = new Date();
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const yesterdayStart = new Date(todayStart);
      yesterdayStart.setDate(yesterdayStart.getDate() - 1);

      // Récupérer l'image du podcast (image du channel ou du dernier item)
      let image = '';
      const channelImage = doc.querySelector('channel > image > url');
      if (channelImage) {
        image = channelImage.textContent;
      }

      let today = 0, yesterday = 0;
      let latestDesc = '';
      let latestTime = new Date(0);

      doc.querySelectorAll('item').forEach(item => {
        const pubDate = item.querySelector('pubDate')?.textContent;
        const title = item.querySelector('title')?.textContent || 'Sans titre';
        
        if (!pubDate) return;

        const date = new Date(pubDate);
        
        if (date > latestTime) {
          latestTime = date;
          latestDesc = title;
          
          // Essayer de récupérer l'image du dernier item si pas d'image du channel
          if (!image) {
            const itemImage = item.querySelector('image > url');
            if (itemImage) image = itemImage.textContent;
          }
        }

        if (date >= todayStart) today++;
        else if (date >= yesterdayStart) yesterday++;
      });

      return { today, yesterday, desc: latestDesc, latestDate: latestTime.getTime(), image };
    }

    async function refreshStats() {
      document.getElementById('header-updated').textContent = 'Actualisation…';
      
      let allToday = 0, allYesterday = 0;
      const feedResults = [];

      for (const feed of ALL_FEEDS) {
        const xml = await fetchRSS(feed.url);
        const { today, yesterday, desc, latestDate } = parseEpisodes(xml);
        
        // Ne compter que les podcasts avec counted: true
        if (feed.counted) {
          allToday += today;
          allYesterday += yesterday;
        }
        
        feedResults.push({ feed: feed.name, today, desc, time: new Date(), latestDate, counted: feed.counted });
      }

      document.getElementById('stat-pod-today').textContent = allToday;
      document.getElementById('stat-pod-d1').textContent = allYesterday;
      document.getElementById('stat-pod-d2').textContent = '—';
      
      const countedPodcasts = feedResults.filter(r => r.counted);
      const activePodcasts = countedPodcasts.filter(r => r.today > 0);
      document.getElementById('monitoring-active').textContent = `${activePodcasts.length}/${countedPodcasts.length} actifs`;

      // Trier par date de mise à jour décroissante (plus récent en haut)
      feedResults.sort((a, b) => (b.latestDate || 0) - (a.latestDate || 0));

      const list = document.getElementById('monitoring-list');
      list.innerHTML = feedResults.map(r => `
        <div class="monitor-row">
          ${r.image ? `<img src="${r.image}" alt="${r.feed}" class="monitor-thumb" onerror="this.style.display='none'">` : '<div class="monitor-thumb" style="background: var(--border);"></div>'}
          <div style="flex: 1; min-width: 0;">
            <div class="monitor-dot dot-${r.today > 0 ? 'green' : 'gray'}" style="margin-bottom: 4px;"></div>
            <div class="monitor-info">
              <div class="monitor-name">${r.feed}</div>
              <div class="monitor-time">${r.latestDate ? new Date(r.latestDate).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}) : '—'}</div>
              <div class="monitor-desc">${r.desc.substring(0, 60)}</div>
            </div>
          </div>
          <div class="monitor-badge">${r.today}</div>
        </div>
      `).join('');

      document.getElementById('header-updated').textContent = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
      showToast('✓ Actualisé', 'success');
    }

    window.addEventListener('load', () => {
      refreshStats();
      setInterval(refreshStats, 5 * 60 * 1000);
    });
