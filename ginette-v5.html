<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="description" content="Tableau de bord podcasts Europe 1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ginette" />
  <title>Ginette · Podcasts</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <style>
    /* ============================================
       GINETTE v5 - Dark/Orange Theme (Responsive)
       ============================================ */

    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-card: #1e1e1e;
      --bg-card-hover: #252525;
      --bg-input: #2a2a2a;
      --border: #2e2e2e;
      --border-light: #383838;

      --orange: #f97316;
      --orange-dark: #ea6c0a;
      --orange-light: #fb923c;

      --blue: #60a5fa;
      --blue-dim: rgba(96, 165, 250, 0.15);
      --orange-dim: rgba(249, 115, 22, 0.15);
      --orange-glow: rgba(249, 115, 22, 0.25);

      --text-primary: #f5f5f5;
      --text-secondary: #a0a0a0;
      --text-muted: #666;

      --success: #22c55e;
      --error: #ef4444;

      --nav-height: 68px;
      --header-height: 64px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --radius-xl: 24px;
    }

    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100dvh;
      margin: 0 auto;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    @media (max-width: 600px) {
      body {
        max-width: 430px;
      }
    }

    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    input, select { font-family: inherit; }
    a { color: var(--orange); text-decoration: none; }

    /* ===== APP SHELL ===== */
    #app { position: relative; min-height: 100dvh; }

    /* ===== VIEWS ===== */
    .view {
      display: none;
      flex-direction: column;
      min-height: 100dvh;
      padding-bottom: var(--nav-height);
      overflow-y: auto;
    }
    .view.active { display: flex; }

    @media (min-width: 601px) {
      .view {
        padding-bottom: 0;
      }
    }

    /* ===== HEADER ===== */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 8px;
      padding-top: max(12px, env(safe-area-inset-top));
      min-height: var(--header-height);
      background: var(--bg-primary);
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }

    @media (min-width: 601px) {
      .app-header {
        padding: 16px 24px;
      }
    }

    .header-left { display: flex; flex-direction: column; gap: 2px; }

    .header-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 500;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
    }
    .header-title svg { color: var(--orange); }

    .header-actions { display: flex; align-items: center; gap: 8px; }

    .btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      position: relative;
      transition: all 0.2s;
    }
    .btn-icon:active { transform: scale(0.95); background: var(--bg-card-hover); }

    /* ===== STATS CARD ===== */
    .stats-card {
      margin: 16px 16px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 22px 14px 16px;
      text-align: center;
    }

    @media (min-width: 601px) {
      .stats-card {
        margin: 24px auto;
        max-width: 900px;
        width: calc(100% - 48px);
      }
    }

    .stat-today-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-bottom: 16px;
    }

    .stat-today-val {
      font-size: 56px;
      font-weight: 900;
      color: var(--orange);
      line-height: 1;
      letter-spacing: -2px;
    }

    .stat-today-lbl {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .stat-prev-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 12px 24px;
      border-top: 1px solid var(--border);
    }

    .stat-prev-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex: 1;
    }

    .stat-prev-val {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-secondary);
      line-height: 1;
    }

    .stat-prev-lbl {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .stat-prev-sep {
      width: 1px;
      height: 28px;
      background: var(--border);
      flex-shrink: 0;
    }

    .stats-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      margin-top: 4px;
    }

    /* ===== MONITORING LIST ===== */
    .monitoring-section {
      margin: 0 16px 16px;
    }

    @media (min-width: 601px) {
      .monitoring-section {
        margin: 0 24px 24px;
        max-width: 900px;
        margin-left: auto;
        margin-right: auto;
      }
    }

    .monitoring-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .monitoring-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.2px;
    }

    .monitoring-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 10px;
    }

    .monitoring-loading {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      padding: 24px 0;
    }

    .monitoring-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    @media (min-width: 601px) {
      .monitoring-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 12px;
      }
    }

    .monitor-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
    }

    @media (min-width: 601px) {
      .monitor-row {
        flex-direction: column;
        align-items: flex-start;
        padding: 14px;
      }
    }

    .monitor-thumb {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--border);
    }

    .monitor-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-green { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .dot-gray  { background: #3f3f46; }

    .monitor-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    @media (min-width: 601px) {
      .monitor-info {
        width: 100%;
        gap: 6px;
      }
    }

    .monitor-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (min-width: 601px) {
      .monitor-name {
        white-space: normal;
      }
    }

    .monitor-link {
      text-decoration: none;
      color: var(--text-primary);
    }
    .monitor-link:hover { color: var(--orange); text-decoration: underline; }

    .monitor-time {
      font-size: 11px;
      color: var(--text-muted);
    }

    .monitor-episode {
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0.8;
    }

    @media (min-width: 601px) {
      .monitor-episode {
        white-space: normal;
      }
    }

    .monitor-badge {
      font-size: 13px;
      font-weight: 700;
      min-width: 28px;
      text-align: center;
      flex-shrink: 0;
    }

    @media (min-width: 601px) {
      .monitor-badge {
        align-self: flex-start;
        font-size: 24px;
        min-width: auto;
      }
    }

    .badge-active { color: var(--orange); }
    .badge-none   { color: #52525b; }

    /* ===== BOTTOM NAVIGATION ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-around;
      align-items: flex-end;
      height: var(--nav-height);
      padding-bottom: env(safe-area-inset-bottom);
      background: var(--bg-primary);
      border-top: 1px solid var(--border);
      z-index: 20;
    }

    @media (min-width: 601px) {
      .bottom-nav {
        display: none;
      }
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex: 1;
      height: 100%;
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      transition: color 0.2s;
    }

    .nav-item.active {
      color: var(--orange);
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
    }

    /* ===== MISC ===== */
    .bottom-spacer { height: 16px; }

    .toast {
      position: fixed;
      bottom: calc(var(--nav-height) + 16px);
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      z-index: 300;
      white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
      opacity: 0;
      max-width: 90%;
    }

    @media (min-width: 601px) {
      .toast {
        bottom: 24px;
      }
    }

    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(34,197,94,0.4); color: var(--success); }
    .toast.error { border-color: rgba(239,68,68,0.4); color: var(--error); }
    .toast.info { border-color: rgba(249,115,22,0.4); color: var(--orange); }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">

    <!-- ===== PODCASTS VIEW (Default) ===== -->
    <div id="view-home" class="view active">
      <header class="app-header">
        <div class="header-left">
          <span class="header-label">Ginette · Europe 1</span>
          <div class="header-title">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.93"/></svg>
            <span id="header-updated">Chargement…</span>
          </div>
        </div>
        <div class="header-actions">
          <button class="btn-icon" id="btn-refresh" onclick="refreshStats()" title="Actualiser les données">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.93"/></svg>
          </button>
          <button class="btn-icon" id="btn-debug" onclick="toggleDebug()" title="Afficher debug">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/></svg>
          </button>
        </div>
      </header>

      <!-- Debug Panel -->
      <div id="debug-panel" style="display:none; padding:12px 16px; background:var(--bg-secondary); border-bottom:1px solid var(--border); font-size:11px; color:var(--text-muted); font-family:monospace; max-height:200px; overflow-y:auto;">
        <div id="debug-content">Initialisation...</div>
      </div>

      <!-- Stats Card -->
      <div class="stats-card" id="stats-bar">
        <div class="stat-today-block">
          <span class="stat-today-val" id="stat-pod-today">—</span>
          <span class="stat-today-lbl">Aujourd'hui</span>
        </div>
        <div class="stat-prev-row">
          <div class="stat-prev-col">
            <span class="stat-prev-val" id="stat-pod-d1">—</span>
            <span class="stat-prev-lbl">Hier</span>
          </div>
          <div class="stat-prev-sep"></div>
          <div class="stat-prev-col">
            <span class="stat-prev-val" id="stat-pod-d2">—</span>
            <span class="stat-prev-lbl">Avant-hier</span>
          </div>
        </div>
        <div class="stats-subtitle">🎙️ Épisodes publiés</div>
      </div>

      <!-- Monitoring list -->
      <div class="monitoring-section">
        <div class="monitoring-header">
          <span class="monitoring-title">Suivi des flux</span>
          <span class="monitoring-count" id="monitoring-active">—</span>
        </div>
        <div class="monitoring-list" id="monitoring-list">
          <div class="monitoring-loading">Chargement…</div>
        </div>
      </div>

      <div class="bottom-spacer"></div>
    </div>

    <!-- ===== BOTTOM NAVIGATION (Mobile only) ===== -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-view="home">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Podcasts</span>
      </button>
    </nav>

    <!-- ===== TOAST ===== -->
    <div class="toast" id="toast"></div>

  </div>

  <script>
    // ============================================
    // GINETTE v5 - Core Logic (Responsive)
    // ============================================

    // Configuration - Exemples de podcasts Audiomeans
    // À remplacer par tes vraies URLs d'Audiomeans
    const FEEDS = [
      { name: 'Europe 1 Matin', url: 'https://feeds.audiomeans.fr/feed/b38cbcd5-a1b8-4f4c-997a-d40c2c04f9e8.xml' },
      { name: 'Journal 19h', url: 'https://feeds.audiomeans.fr/feed/ef5725f5-4ed2-46cb-a8de-dd21d78789d4.xml' },
      { name: 'Au Cœur de l\'Histoire', url: 'https://feeds.audiomeans.fr/feed/au-coeur-de-histoire.xml' },
    ];

    // Proxy for CORS - Utilise cors-anywhere si besoin
    const PROXY = 'https://cors-anywhere.herokuapp.com/';

    // Debug function
    let debugVisible = false;
    function toggleDebug() {
      debugVisible = !debugVisible;
      const panel = document.getElementById('debug-panel');
      panel.style.display = debugVisible ? 'block' : 'none';
    }

    function addDebugLog(msg) {
      const content = document.getElementById('debug-content');
      const timestamp = new Date().toLocaleTimeString('fr-FR');
      content.innerHTML += `<div>[${timestamp}] ${msg}</div>`;
      content.scrollTop = content.scrollHeight;
    }

    // Override console.log for debug
    const originalLog = console.log;
    console.log = function(...args) {
      originalLog.apply(console, args);
      addDebugLog(args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' '));
    };
    function formatDate(d) {
      return new Intl.DateTimeFormat('fr-FR', { 
        weekday: 'short', day: '2-digit', month: '2-digit' 
      }).format(d);
    }

    function showToast(msg, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Fetch RSS with retry and better error handling
    async function fetchRSS(url) {
      try {
        // Essayer d'abord sans proxy
        const res = await fetch(url, { 
          headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)' },
          mode: 'cors'
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.text();
      } catch (e) {
        console.warn(`Direct fetch failed for ${url}, trying with proxy...`);
        try {
          // Essayer avec proxy si le fetch direct échoue
          const proxiedUrl = PROXY + encodeURIComponent(url);
          const res = await fetch(proxiedUrl, { 
            headers: { 'User-Agent': 'Mozilla/5.0' }
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return await res.text();
        } catch (e2) {
          console.error(`Failed to fetch ${url}:`, e2.message);
          return null;
        }
      }
    }

    // Parse RSS and count episodes
    function parseEpisodes(xml) {
      if (!xml) return { today: 0, yesterday: 0, items: [] };
      
      const parser = new DOMParser();
      const doc = parser.parseFromString(xml, 'text/xml');
      
      if (doc.querySelector('parsererror')) return { today: 0, yesterday: 0, items: [] };

      const now = new Date();
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const yesterdayStart = new Date(todayStart);
      yesterdayStart.setDate(yesterdayStart.getDate() - 1);

      let today = 0, yesterday = 0;
      const items = [];

      doc.querySelectorAll('item').forEach(item => {
        const pubDate = item.querySelector('pubDate')?.textContent;
        const title = item.querySelector('title')?.textContent || 'Sans titre';
        const link = item.querySelector('link')?.textContent || '#';
        
        if (!pubDate) return;

        const date = new Date(pubDate);
        items.push({ title, link, date });

        if (date >= todayStart) today++;
        else if (date >= yesterdayStart) yesterday++;
      });

      return { today, yesterday, items: items.slice(0, 5) };
    }

    // Refresh stats
    async function refreshStats() {
      document.getElementById('header-updated').textContent = 'Actualisation…';
      
      let allToday = 0, allYesterday = 0;
      const feedResults = [];

      for (const feed of FEEDS) {
        const xml = await fetchRSS(feed.url);
        const { today, yesterday, items } = parseEpisodes(xml);
        allToday += today;
        allYesterday += yesterday;
        feedResults.push({ feed: feed.name, today, items });
      }

      // Update stats
      document.getElementById('stat-pod-today').textContent = allToday;
      document.getElementById('stat-pod-d1').textContent = allYesterday;
      document.getElementById('stat-pod-d2').textContent = '—'; // Not tracked
      document.getElementById('monitoring-active').textContent = `${FEEDS.length}`;

      // Update monitoring list
      const list = document.getElementById('monitoring-list');
      list.innerHTML = feedResults.map(r => `
        <div class="monitor-row">
          <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
            <div class="monitor-dot dot-${r.today > 0 ? 'green' : 'gray'}"></div>
            <div class="monitor-info">
              <div class="monitor-name">${r.feed}</div>
              <div class="monitor-time">${r.items[0]?.date.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}) || '—'}</div>
            </div>
            <div class="monitor-badge badge-${r.today > 0 ? 'active' : 'none'}">${r.today}</div>
          </div>
        </div>
      `).join('');

      document.getElementById('header-updated').textContent = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
      showToast('✓ Données actualisées', 'success');
    }

    // Navigation (mobile only)
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        
        btn.classList.add('active');
        const viewId = `view-${btn.dataset.view}`;
        document.getElementById(viewId).classList.add('active');
      });
    });

    // Initialize
    window.addEventListener('load', () => {
      console.log('🚀 Ginette v5 started');
      console.log('Feeds configured:', FEEDS.length);
      refreshStats();
      setInterval(refreshStats, 5 * 60 * 1000); // Auto-refresh every 5 min
    });

    // Error handler pour window
    window.addEventListener('error', (e) => {
      console.error('❌ Global error:', e.error);
    });
  </script>
</body>
</html>
